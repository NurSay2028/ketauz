<!DOCTYPE html><html><head><meta charset="utf-8">
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@800&family=Space+Mono&display=swap" rel="stylesheet">
<style>body{margin:0;font-family:'Sora',sans-serif;background:#0a0c14;color:#eef1f8}
.row{padding:50px;display:flex;align-items:center;gap:40px;border-bottom:1px solid #ffffff15;flex-wrap:wrap}
.dark{background:#05060a}.light{background:#f4f6fb;color:#0a0e1a}
.lbl{font-family:'Space Mono',monospace;font-size:13px;color:#8b93a7;width:160px}
h1{padding:40px 50px 0;font-weight:800}</style></head><body>
<h1>KETA.COMP — Logo variantlari</h1>
<div class="row dark"><span class="lbl">logo-full<br>(asosiy / navbar)</span><svg width="360" height="90" viewBox="0 0 360 90" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="KETA.COMP">
  <defs>
    <linearGradient id="kg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#3b82f6"/>
      <stop offset="0.6" stop-color="#22d3ee"/>
      <stop offset="1" stop-color="#818cf8"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- MARK: stylized "K" built from an ecosystem of connected nodes -->
  <g filter="url(#glow)">
    <!-- vertical spine of the K -->
    <line x1="18" y1="20" x2="18" y2="70" stroke="url(#kg)" stroke-width="5" stroke-linecap="round"/>
    <!-- upper diagonal -->
    <line x1="18" y1="45" x2="52" y2="18" stroke="url(#kg)" stroke-width="5" stroke-linecap="round"/>
    <!-- lower diagonal -->
    <line x1="18" y1="45" x2="52" y2="72" stroke="url(#kg)" stroke-width="5" stroke-linecap="round"/>
    <!-- connecting node link (ecosystem hint) -->
    <line x1="52" y1="18" x2="52" y2="72" stroke="#22d3ee" stroke-width="2" stroke-opacity="0.35"/>
  </g>
  <!-- nodes -->
  <circle cx="18" cy="20" r="4.5" fill="#22d3ee"/>
  <circle cx="18" cy="70" r="4.5" fill="#3b82f6"/>
  <circle cx="52" cy="18" r="5" fill="#22d3ee"/>
  <circle cx="52" cy="72" r="5" fill="#818cf8"/>
  <circle cx="18" cy="45" r="3.5" fill="#ffffff"/>

  <!-- WORDMARK -->
  <text x="78" y="56" font-family="'Sora','Segoe UI',sans-serif" font-size="34" font-weight="800" letter-spacing="-1" fill="#eef1f8">KETA<tspan fill="url(#kg)">.COMP</tspan></text>
  <text x="79" y="74" font-family="'Space Mono',monospace" font-size="9.5" letter-spacing="3" fill="#8b93a7">ENGINEERING TOMORROW</text>
</svg></div>
<div class="row dark"><span class="lbl">logo-mark<br>(favicon / icon)</span><svg width="120" height="120" viewBox="0 0 120 120" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="KETA.COMP mark">
  <defs>
    <linearGradient id="kg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#3b82f6"/><stop offset="0.6" stop-color="#22d3ee"/><stop offset="1" stop-color="#818cf8"/>
    </linearGradient>
  </defs>
  <rect width="120" height="120" rx="28" fill="#05060a"/>
  <rect x="1" y="1" width="118" height="118" rx="27" fill="none" stroke="url(#kg)" stroke-opacity="0.25" stroke-width="1.5"/>
  <g stroke-linecap="round">
    <line x1="42" y1="34" x2="42" y2="86" stroke="url(#kg)" stroke-width="6"/>
    <line x1="42" y1="60" x2="80" y2="32" stroke="url(#kg)" stroke-width="6"/>
    <line x1="42" y1="60" x2="80" y2="88" stroke="url(#kg)" stroke-width="6"/>
    <line x1="80" y1="32" x2="80" y2="88" stroke="#22d3ee" stroke-width="2" stroke-opacity="0.35"/>
  </g>
  <circle cx="42" cy="34" r="5" fill="#22d3ee"/>
  <circle cx="42" cy="86" r="5" fill="#3b82f6"/>
  <circle cx="80" cy="32" r="5.5" fill="#22d3ee"/>
  <circle cx="80" cy="88" r="5.5" fill="#818cf8"/>
  <circle cx="42" cy="60" r="4" fill="#ffffff"/>
</svg></div>
<div class="row light"><span class="lbl">logo-light<br>(och fon uchun)</span><svg width="360" height="90" viewBox="0 0 360 90" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="KETA.COMP">
  <defs>
    <linearGradient id="kg2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#2563eb"/><stop offset="0.6" stop-color="#0891b2"/><stop offset="1" stop-color="#6366f1"/>
    </linearGradient>
  </defs>
  <g stroke-linecap="round">
    <line x1="18" y1="20" x2="18" y2="70" stroke="url(#kg2)" stroke-width="5"/>
    <line x1="18" y1="45" x2="52" y2="18" stroke="url(#kg2)" stroke-width="5"/>
    <line x1="18" y1="45" x2="52" y2="72" stroke="url(#kg2)" stroke-width="5"/>
  </g>
  <circle cx="18" cy="20" r="4.5" fill="#0891b2"/>
  <circle cx="18" cy="70" r="4.5" fill="#2563eb"/>
  <circle cx="52" cy="18" r="5" fill="#0891b2"/>
  <circle cx="52" cy="72" r="5" fill="#6366f1"/>
  <circle cx="18" cy="45" r="3.5" fill="#0a0e1a"/>
  <text x="78" y="56" font-family="'Sora','Segoe UI',sans-serif" font-size="34" font-weight="800" letter-spacing="-1" fill="#0a0e1a">KETA<tspan fill="url(#kg2)">.COMP</tspan></text>
  <text x="79" y="74" font-family="'Space Mono',monospace" font-size="9.5" letter-spacing="3" fill="#5a6275">ENGINEERING TOMORROW</text>
</svg></div>
<div class="row dark"><span class="lbl">logo-mono<br>(footer / watermark)</span><svg width="360" height="90" viewBox="0 0 360 90" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="KETA.COMP">
  <g stroke-linecap="round">
    <line x1="18" y1="20" x2="18" y2="70" stroke="#ffffff" stroke-width="5"/>
    <line x1="18" y1="45" x2="52" y2="18" stroke="#ffffff" stroke-width="5"/>
    <line x1="18" y1="45" x2="52" y2="72" stroke="#ffffff" stroke-width="5"/>
  </g>
  <circle cx="18" cy="20" r="4.5" fill="#ffffff"/>
  <circle cx="18" cy="70" r="4.5" fill="#ffffff"/>
  <circle cx="52" cy="18" r="5" fill="#ffffff"/>
  <circle cx="52" cy="72" r="5" fill="#ffffff"/>
  <circle cx="18" cy="45" r="3.5" fill="#05060a"/>
  <text x="78" y="58" font-family="'Sora','Segoe UI',sans-serif" font-size="34" font-weight="800" letter-spacing="-1" fill="#ffffff">KETA.COMP</text>
</svg></div>
</body></html>
